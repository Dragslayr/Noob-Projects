<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="quote"></div>
      <div class="timer">
        <div class="thead">
          <select name="thead" id="thead">
            <option value="time" disabled selected>time</option>
            <option value="10">10min</option>
            <option value="15">15min</option>
            <option value="30">30min</option>
            <option value="60">60min</option>
          </select>
        </div>
        <div class="time">select time</div>
        <div class="cntdown">
          <div class="box" id="box1">0</div>
          <div class="box" id="box2">0</div>
          <div class="col">:</div>
          <div class="box" id="box3">0</div>
          <div class="box" id="box4">0</div>
        </div>
      </div>
      <div class="button">
        <div class="start">
          <button>start</button>
        </div>
        <div class="reset">
          <button hidden>reset</button>
        </div>
      </div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
