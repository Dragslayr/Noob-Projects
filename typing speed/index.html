<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type speed test</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="typewriter_2126440.png" />
  </head>
  <body>
    <div class="container">
      <header>Typing speed test</header>

      <div class="top-panel">
        <div class="highscore">Best: <span id="bestWpm">0</span> wpm</div>
        <div class="settings">
          <select id="timeSelect">
            <option value="10">10 Sec</option>
            <option value="30" selected>30 Sec</option>
            <option value="60">1 Min</option>
          </select>
          <select id="caseSelect">
            <option value="mixed" selected>Mixed Case</option>
            <option value="lower">Lowercase Only</option>
          </select>
        </div>
      </div>

      <div class="timer">30</div>
      <div class="given"></div>
      <div class="textInput">
        <input
          type="text"
          id="textInput"
          placeholder="type here"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </div>
      <div class="resetBtn">
        <button id="resetBtn">Reset</button>
      </div>
      <div class="stats">
        <div class="wpm">wpm</div>
        <div class="accuracy">accuracy</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
