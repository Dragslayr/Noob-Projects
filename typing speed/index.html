<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type speed test</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>Typing speed test</header>
      <div class="timer">Time</div>
      <div class="given"></div>
      <div class="textInput">
        <input
          type="text"
          id="textInput"
          placeholder="type here"
          autocomplete="off"
        />
      </div>
      <div class="resetBtn">
        <button>Reset</button>
      </div>
      <div class="stats">
        <div class="wpm">wpm</div>
        <div class="accuracy">accuracy</div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
